<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="faviconBrand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#60a5fa"/>
      <stop offset="0.5" stop-color="#2563eb"/>
      <stop offset="1"   stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>

  <!-- White rounded-square background (matches user's app-icon style) -->
  <rect width="96" height="96" rx="20" fill="#ffffff"/>

  <!-- Motion lines -->
  <g stroke="url(#faviconBrand)" stroke-width="4" stroke-linecap="round">
    <line x1="14" y1="40" x2="32" y2="40" opacity="0.95"/>
    <line x1="8"  y1="49" x2="36" y2="49" opacity="0.9"/>
    <line x1="2"  y1="58" x2="40" y2="58" opacity="0.85"/>
    <line x1="10" y1="67" x2="32" y2="67" opacity="0.8"/>
    <line x1="18" y1="76" x2="30" y2="76" opacity="0.7"/>
  </g>

  <!-- House -->
  <g fill="none" stroke="url(#faviconBrand)" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">
    <path d="M40 36 L62 18 L84 36"/>
    <path d="M78 18 L78 28"/>
    <path d="M42 36 L42 84 L82 84 L82 36"/>
    <rect x="68" y="42" width="10" height="10"/>
    <line x1="73" y1="42" x2="73" y2="52"/>
    <line x1="68" y1="47" x2="78" y2="47"/>
  </g>

  <!-- Clipboard -->
  <g>
    <rect x="46" y="48" width="32" height="36" rx="3" fill="#ffffff" stroke="url(#faviconBrand)" stroke-width="3.6"/>
    <g stroke="url(#faviconBrand)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M51 58 L54 61 L60 55"/>
      <line x1="63" y1="58" x2="73" y2="58"/>
      <path d="M51 67 L54 70 L60 64"/>
      <line x1="63" y1="67" x2="73" y2="67"/>
      <path d="M51 76 L54 79 L60 73"/>
      <line x1="63" y1="76" x2="73" y2="76"/>
    </g>
  </g>
</svg>
