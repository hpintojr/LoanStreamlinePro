<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" aria-hidden="true">
  <defs>
    <linearGradient id="markBrand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#60a5fa"/>
      <stop offset="0.5" stop-color="#2563eb"/>
      <stop offset="1"   stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>

  <!-- 5 staggered motion / speed lines (long-med-longest-med-short) -->
  <g stroke="url(#markBrand)" stroke-width="4" stroke-linecap="round">
    <line x1="14" y1="40" x2="32" y2="40" opacity="0.95"/>
    <line x1="8"  y1="49" x2="36" y2="49" opacity="0.9"/>
    <line x1="2"  y1="58" x2="40" y2="58" opacity="0.85"/>
    <line x1="10" y1="67" x2="32" y2="67" opacity="0.8"/>
    <line x1="18" y1="76" x2="30" y2="76" opacity="0.7"/>
  </g>

  <!-- House body (widened, slightly shorter) -->
  <g fill="none" stroke="url(#markBrand)" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">
    <!-- Roof + chimney -->
    <path d="M35.6 37.9 L62 21.4 L88.4 37.9"/>
    <path d="M81.2 21.4 L81.2 30.6"/>
    <!-- Walls -->
    <path d="M38 37.9 L38 82.1 L86 82.1 L86 37.9"/>
    <!-- 2x2 window grid -->
    <rect x="69.2" y="43.4" width="12" height="9.2"/>
    <line x1="75.2" y1="43.4" x2="75.2" y2="52.6"/>
    <line x1="69.2" y1="48" x2="81.2" y2="48"/>
  </g>

  <!-- Clipboard overlay -->
  <g>
    <rect x="42.8" y="49" width="38.4" height="33.1" rx="3" fill="#ffffff" stroke="url(#markBrand)" stroke-width="3.6"/>
    <g stroke="url(#markBrand)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Row 1 -->
      <path d="M48.8 58.2 L52.4 60.9 L59.6 55.4"/>
      <line x1="63.2" y1="58.2" x2="75.2" y2="58.2"/>
      <!-- Row 2 -->
      <path d="M48.8 66.4 L52.4 69.2 L59.6 63.7"/>
      <line x1="63.2" y1="66.4" x2="75.2" y2="66.4"/>
      <!-- Row 3 -->
      <path d="M48.8 74.7 L52.4 77.5 L59.6 72"/>
      <line x1="63.2" y1="74.7" x2="75.2" y2="74.7"/>
    </g>
  </g>
</svg>
