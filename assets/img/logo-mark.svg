<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-hidden="true">
  <defs>
    <linearGradient id="markBrand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="0.6" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Motion / speed lines -->
  <g stroke="url(#markBrand)" stroke-width="2.4" stroke-linecap="round">
    <line x1="6"  y1="30" x2="20" y2="30" opacity="0.95"/>
    <line x1="3"  y1="36" x2="24" y2="36" opacity="0.85"/>
    <line x1="10" y1="42" x2="20" y2="42" opacity="0.75"/>
  </g>

  <!-- House body -->
  <g fill="none" stroke="url(#markBrand)" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
    <path d="M26 22 L40 12 L54 22"/>
    <path d="M50 12 L50 18"/>
    <path d="M28 22 L28 52 L52 52 L52 22"/>
    <rect x="42" y="26" width="6" height="6"/>
    <line x1="45" y1="26" x2="45" y2="32"/>
    <line x1="42" y1="29" x2="48" y2="29"/>
  </g>

  <!-- Clipboard -->
  <g>
    <rect x="30" y="30" width="20" height="22" rx="2" fill="#ffffff" stroke="url(#markBrand)" stroke-width="2.2"/>
    <g stroke="url(#markBrand)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M33 37 L35 39 L39 35"/>
      <line x1="41" y1="37" x2="47" y2="37"/>
      <path d="M33 43 L35 45 L39 41"/>
      <line x1="41" y1="43" x2="47" y2="43"/>
      <path d="M33 49 L35 51 L39 47"/>
      <line x1="41" y1="49" x2="47" y2="49"/>
    </g>
  </g>
</svg>
