<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 90" aria-label="Loan Streamline Pro">
  <defs>
    <linearGradient id="logoBrand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="0.6" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- ===== Mark (house + clipboard) ===== -->
  <g transform="translate(0,12)">
    <!-- Motion lines -->
    <g stroke="url(#logoBrand)" stroke-width="3" stroke-linecap="round">
      <line x1="4"  y1="30" x2="22" y2="30" opacity="0.95"/>
      <line x1="0"  y1="40" x2="28" y2="40" opacity="0.85"/>
      <line x1="10" y1="50" x2="22" y2="50" opacity="0.75"/>
    </g>

    <!-- House -->
    <g fill="none" stroke="url(#logoBrand)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round">
      <path d="M28 22 L46 8 L64 22"/>
      <path d="M58 8 L58 16"/>
      <path d="M30 22 L30 62 L62 62 L62 22"/>
      <rect x="50" y="28" width="8" height="8"/>
      <line x1="54" y1="28" x2="54" y2="36"/>
      <line x1="50" y1="32" x2="58" y2="32"/>
    </g>

    <!-- Clipboard -->
    <g>
      <rect x="34" y="34" width="26" height="28" rx="3" fill="#ffffff" stroke="url(#logoBrand)" stroke-width="2.6"/>
      <g stroke="url(#logoBrand)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <path d="M38 42 L40.5 44.5 L45 40"/>
        <line x1="47" y1="42" x2="56" y2="42"/>
        <path d="M38 50 L40.5 52.5 L45 48"/>
        <line x1="47" y1="50" x2="56" y2="50"/>
        <path d="M38 58 L40.5 60.5 L45 56"/>
        <line x1="47" y1="58" x2="56" y2="58"/>
      </g>
    </g>
  </g>

  <!-- ===== Wordmark ===== -->
  <g font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
    <!-- Loan -->
    <text x="90" y="50" font-size="34" font-weight="800" fill="#0f172a">Loan</text>
    <!-- Streamline (brand color) -->
    <text x="173" y="50" font-size="34" font-weight="800" fill="#3b82f6">Streamline</text>
    <!-- Pro -->
    <text x="357" y="50" font-size="34" font-weight="800" fill="#0f172a">Pro</text>

    <!-- Tagline with accent lines -->
    <g transform="translate(90,68)">
      <line x1="0" y1="3" x2="20" y2="3" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
      <text x="26" y="8" font-size="11" font-weight="600" fill="#1e3a8a" letter-spacing="3">STREAMLINE TODAY. CLOSE TOMORROW.</text>
      <line x1="306" y1="3" x2="326" y2="3" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>
</svg>
